<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lírio para Soso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box} html,body{width:100%;height:100%;overflow:hidden} body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#06112b 0%,#0d234f 42%,#21184c 72%,#10071d 100%);color:#fff} canvas{position:fixed;inset:0;width:100%;height:100%;z-index:5}.halo{position:fixed;inset:-20%;z-index:0;background:radial-gradient(circle at 78% 17%,rgba(236,246,255,.65),rgba(164,190,255,.18) 13%,transparent 33%);animation:halo 8s ease-in-out infinite}.lua{position:fixed;top:58px;right:8vw;width:165px;height:165px;border-radius:50%;z-index:1;background:radial-gradient(circle at 35% 33%,#fff 0 18%,#fff8ce 38%,#dfe9ff 67%,rgba(223,233,255,0) 72%);filter:drop-shadow(0 0 42px rgba(220,235,255,.95));animation:luaPulse 6s ease-in-out infinite}.lua:before{content:"";position:absolute;left:46px;top:35px;width:25px;height:25px;border-radius:50%;background:rgba(150,170,205,.18);box-shadow:42px 24px 0 rgba(150,170,205,.14),18px 70px 0 rgba(150,170,205,.12),75px 72px 0 rgba(150,170,205,.10)}.estrela{position:fixed;width:2px;height:2px;border-radius:50%;background:#fff;z-index:1;box-shadow:0 0 9px #fff;animation:twinkle 3s ease-in-out infinite}.shooting{position:fixed;z-index:2;width:130px;height:2px;border-radius:99px;background:linear-gradient(90deg,transparent,#fff,transparent);transform:rotate(-18deg);opacity:0;animation:shoot 14s linear infinite}.s1{top:25%;left:65%;animation-delay:8s}.s2{top:38%;left:20%;animation-delay:16s}.nuvem{position:fixed;z-index:2;background:rgba(230,238,255,.23);border-radius:999px;filter:blur(1px);animation:moverNuvem linear infinite}.nuvem:before,.nuvem:after{content:"";position:absolute;background:rgba(230,238,255,.23);border-radius:50%}.n1{width:250px;height:64px;top:115px;left:-330px;animation-duration:58s}.n1:before{width:100px;height:100px;left:38px;top:-48px}.n1:after{width:125px;height:125px;right:24px;top:-67px}.n2{width:180px;height:50px;top:240px;left:-240px;animation-duration:72s;animation-delay:-26s;opacity:.7}.n2:before{width:75px;height:75px;left:24px;top:-36px}.n2:after{width:95px;height:95px;right:16px;top:-51px}.aviao-wrap{position:fixed;top:135px;left:-300px;z-index:8;animation:voar 24s cubic-bezier(.16,.62,.28,1) 4s infinite}.rastro{position:absolute;right:60px;top:30px;width:260px;height:4px;border-radius:99px;background:linear-gradient(90deg,transparent,rgba(245,250,255,.95));box-shadow:0 0 18px rgba(235,245,255,.95);opacity:.9}.aviao{position:relative;width:92px;height:40px;filter:drop-shadow(0 0 10px rgba(230,240,255,.5))}.corpo{position:absolute;left:7px;top:16px;width:78px;height:10px;border-radius:70% 20% 20% 70%;background:#f7fbff}.nariz{position:absolute;right:0;top:17px;border-left:16px solid #f7fbff;border-top:5px solid transparent;border-bottom:5px solid transparent}.asa{position:absolute;left:36px;top:3px;width:42px;height:13px;background:#dceaff;clip-path:polygon(0 100%,100% 55%,22% 0)}.asa.baixo{top:24px;transform:scaleY(-1)}.cauda{position:absolute;left:5px;top:6px;width:24px;height:16px;background:#dceaff;clip-path:polygon(0 100%,100% 65%,22% 0)}.luz{position:absolute;width:7px;height:7px;border-radius:50%;top:5px;animation:piscar .9s steps(2) infinite}.luz.red{right:5px;background:#ff5b70;box-shadow:0 0 12px #ff5b70}.luz.green{right:4px;top:28px;background:#58ff9a;box-shadow:0 0 12px #58ff9a}.heart{position:fixed;left:50%;top:26%;transform:translate(-50%,-50%) scale(.2);z-index:6;color:#fff;text-shadow:0 0 18px #fff,0 0 30px #ff9fc9;font-size:80px;opacity:0;animation:heartBeat 24s ease-in-out 4s infinite}.soso{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:6;font-size:clamp(42px,9vw,92px);font-family:Georgia,serif;color:#fff7fc;text-shadow:0 0 18px #fff,0 0 35px #ff9ccd;opacity:0;animation:soso 24s ease-in-out 4s infinite}.painel{position:fixed;right:14px;top:14px;z-index:20;display:flex;gap:7px;align-items:center;padding:9px 10px;border:1px solid rgba(255,255,255,.22);border-radius:18px;background:rgba(7,15,35,.45);backdrop-filter:blur(8px)}.painel span{font-size:12px;color:#ddebff}.painel button{border:0;border-radius:14px;padding:7px 10px;background:rgba(255,255,255,.14);color:#fff;font-weight:700;cursor:pointer}.painel button.active{background:#fff;color:#17224a;box-shadow:0 0 14px rgba(255,255,255,.7)}.mensagem{position:fixed;left:50%;bottom:45px;transform:translateX(-50%);z-index:12;width:min(92vw,850px);text-align:center;pointer-events:none}.linha{display:block;opacity:0;filter:blur(4px);transform:translateY(18px);animation:revelar 24s ease-in-out 4s infinite}.linha1{font-size:clamp(22px,4.8vw,46px);font-weight:800;text-shadow:0 0 18px #8fc3ff;animation-delay:18s}.linha2{font-size:clamp(16px,3.4vw,30px);margin-top:9px;color:#e8f2ff;text-shadow:0 0 14px #9fcaff;animation-delay:20.2s}.linha3{font-size:clamp(22px,4.6vw,44px);margin-top:13px;font-weight:800;color:#fff8fb;text-shadow:0 0 20px #ff8fc7,0 0 35px #ff4fa3;animation-delay:22.5s}.final{position:fixed;left:50%;top:57%;transform:translate(-50%,-50%);z-index:13;font-size:clamp(25px,6vw,56px);font-weight:900;color:#fff;text-align:center;text-shadow:0 0 20px #fff,0 0 40px #b6d7ff;opacity:0;animation:finalMsg 24s ease-in-out 4s infinite}.assinatura{position:fixed;right:20px;bottom:16px;z-index:12;font-size:14px;color:rgba(255,255,255,.72);opacity:0;animation:assina 24s ease-in-out 4s infinite}.music{position:fixed;left:14px;top:14px;z-index:20;border:1px solid rgba(255,255,255,.22);border-radius:18px;background:rgba(7,15,35,.45);color:#fff;padding:9px 12px;backdrop-filter:blur(8px);cursor:pointer}.petala{position:fixed;top:-30px;z-index:4;color:#fff1f8;opacity:.72;text-shadow:0 0 10px #ffb7d9;animation:cair linear infinite}@keyframes luaPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 35px rgba(220,235,255,.85))}50%{transform:scale(1.035);filter:drop-shadow(0 0 62px rgba(235,246,255,1))}}@keyframes halo{50%{opacity:.75}}@keyframes twinkle{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.45)}}@keyframes moverNuvem{to{transform:translateX(calc(100vw + 700px))}}@keyframes voar{0%{transform:translateX(0) translateY(0)}35%{transform:translateX(calc(55vw + 260px)) translateY(6px)}70%{transform:translateX(calc(100vw + 650px)) translateY(-8px)}100%{transform:translateX(calc(100vw + 650px)) translateY(-8px)}}@keyframes piscar{50%{opacity:.25}}@keyframes heartBeat{0%,25%{opacity:0;transform:translate(-50%,-50%) scale(.2)}34%{opacity:.95;transform:translate(-50%,-50%) scale(1)}37%{transform:translate(-50%,-50%) scale(1.18)}40%{transform:translate(-50%,-50%) scale(1)}43%{transform:translate(-50%,-50%) scale(1.15)}48%{opacity:.85}54%,100%{opacity:0;transform:translate(-50%,-50%) scale(.92)}}@keyframes soso{0%,40%{opacity:0;letter-spacing:20px}47%,58%{opacity:1;letter-spacing:4px}65%,100%{opacity:0;letter-spacing:12px}}@keyframes revelar{0%,70%{opacity:0;filter:blur(4px);transform:translateY(18px)}78%,93%{opacity:1;filter:blur(0);transform:translateY(0)}100%{opacity:0}}@keyframes finalMsg{0%,82%{opacity:0;transform:translate(-50%,-50%) scale(.9)}90%,96%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0}}@keyframes assina{0%,78%{opacity:0}86%,98%{opacity:1}100%{opacity:0}}@keyframes shoot{0%,78%{opacity:0;transform:translate(0,0) rotate(-18deg)}82%{opacity:1}90%,100%{opacity:0;transform:translate(-520px,170px) rotate(-18deg)}}@keyframes cair{to{transform:translateY(110vh) rotate(360deg)}}@media(max-width:600px){.lua{width:118px;height:118px;top:62px;right:18px}.painel{right:8px;top:56px;transform:scale(.9);transform-origin:top right}.aviao-wrap{top:126px}.heart{font-size:58px}.soso{top:35%}.mensagem{bottom:35px}.assinatura{font-size:12px}}
</style>
</head>
<body>
<div class="halo"></div><div class="lua"></div><div class="shooting s1"></div><div class="shooting s2"></div>
<div class="nuvem n1"></div><div class="nuvem n2"></div>
<button class="music" id="music">🔇 Música</button>
<div class="painel"><span>Velocidade</span><button class="active" data-speed="1">1x</button><button data-speed="2">2x</button><button data-speed="3">3x</button><button id="restart">↻</button></div>
<div class="aviao-wrap"><div class="rastro"></div><div class="aviao"><div class="corpo"></div><div class="nariz"></div><div class="asa"></div><div class="asa baixo"></div><div class="cauda"></div><div class="luz red"></div><div class="luz green"></div></div></div>
<div class="heart">♡</div><div class="soso">Soso</div>
<div class="final">Nunca deixe de voar. ✈️</div>
<div class="mensagem"><span class="linha linha1">Para a futura aeromoça Soso... ✈️</span><span class="linha linha2">Que cada voo te aproxime dos seus sonhos.</span><span class="linha linha3">Um lírio para meu delírio. 🌸🤍</span></div>
<div class="assinatura">Com carinho, Paulo. 🤍</div>
<canvas id="canvas"></canvas>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let W,H,particles=[],outline=[],stars=[],speed=1,start=performance.now();
function cssSpeed(v){document.documentElement.style.setProperty('--s',v);document.querySelectorAll('.painel button[data-speed]').forEach(b=>b.classList.toggle('active',+b.dataset.speed===v));document.querySelectorAll('[class]').forEach(el=>{if(el!==canvas)el.style.animationDuration='';});document.querySelectorAll('.lua,.halo,.aviao-wrap,.heart,.soso,.linha,.final,.assinatura,.shooting').forEach(el=>{const d=getComputedStyle(el).animationDuration.split(',')[0]; if(d.endsWith('s')) el.style.animationDuration=(parseFloat(d)/v)+'s';});}
document.querySelectorAll('.painel button[data-speed]').forEach(b=>b.onclick=()=>{speed=+b.dataset.speed;cssSpeed(speed)});document.getElementById('restart').onclick=()=>{start=performance.now();create();};
const musicBtn=document.getElementById('music');let audioCtx,osc,gain,playing=false;musicBtn.onclick=()=>{if(!playing){audioCtx=new (window.AudioContext||window.webkitAudioContext)();gain=audioCtx.createGain();gain.gain.value=.025;gain.connect(audioCtx.destination);osc=audioCtx.createOscillator();osc.type='sine';osc.frequency.value=432;osc.connect(gain);osc.start();playing=true;musicBtn.textContent='🔊 Música';}else{osc.stop();playing=false;musicBtn.textContent='🔇 Música';}};
function rand(a,b){return a+Math.random()*(b-a)}
class P{constructor(tx,ty,c,s,delay=0){this.x=rand(0,W);this.y=rand(H+40,H+380);this.tx=tx;this.ty=ty;this.c=c;this.s=s;this.vx=0;this.vy=0;this.a=rand(.5,1);this.delay=delay;this.seed=Math.random()*9}update(t){if(t<this.delay)return;let breathe=Math.sin(t*1.6+this.seed)*1.5;let dx=(this.tx)-this.x,dy=(this.ty+breathe)-this.y;this.vx+=dx*.0045*speed;this.vy+=dy*.0045*speed;this.vx*=.94;this.vy*=.94;this.x+=this.vx;this.y+=this.vy}draw(t){if(t<this.delay)return;ctx.globalAlpha=this.a;ctx.fillStyle=this.c;ctx.shadowBlur=16;ctx.shadowColor=this.c;ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
function petal(cx,cy,rx,ry,rot,n,delay){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random());let x=Math.cos(a)*rx*r,y=Math.sin(a)*ry*r;let cs=Math.cos(rot),sn=Math.sin(rot);let px=cx+x*cs-y*sn,py=cy+x*sn+y*cs;particles.push(new P(px,py,Math.random()>.22?'#fff8fb':'#ffd5e8',rand(1.1,2.8),delay+rand(0,.8)));}}
function line(x1,y1,x2,y2,n,c,delay){for(let i=0;i<n;i++){let t=i/n;particles.push(new P(x1+(x2-x1)*t+rand(-4,4),y1+(y2-y1)*t+rand(-4,4),c,rand(1,2.4),delay+rand(0,.6)));}}
function addOutline(cx,cy,rx,ry,rot,n){for(let i=0;i<n;i++){let a=i/n*Math.PI*2;let x=Math.cos(a)*rx,y=Math.sin(a)*ry;let cs=Math.cos(rot),sn=Math.sin(rot);outline.push({x:cx+x*cs-y*sn,y:cy+x*sn+y*cs})}}
function create(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;particles=[];outline=[];stars=[];let cx=W/2,cy=H*.53,sc=Math.min(W,H)/760;line(cx,cy+60*sc,cx,cy+260*sc,120,'#5fe08c',0);petal(cx,cy-65*sc,58*sc,135*sc,0,150,3);petal(cx-86*sc,cy-15*sc,58*sc,130*sc,-.85,140,5);petal(cx+86*sc,cy-15*sc,58*sc,130*sc,.85,140,6);petal(cx-100*sc,cy+65*sc,48*sc,112*sc,-1.35,115,7);petal(cx+100*sc,cy+65*sc,48*sc,112*sc,1.35,115,8);petal(cx,cy+80*sc,68*sc,105*sc,0,115,9);line(cx,cy,cx-46*sc,cy-58*sc,32,'#ffe879',10);line(cx,cy,cx+46*sc,cy-58*sc,32,'#ffe879',10.2);line(cx,cy,cx-18*sc,cy-78*sc,32,'#ffe879',10.4);line(cx,cy,cx+18*sc,cy-78*sc,32,'#ffe879',10.6);let specs=[[cx,cy-65*sc,58*sc,135*sc,0],[cx-86*sc,cy-15*sc,58*sc,130*sc,-.85],[cx+86*sc,cy-15*sc,58*sc,130*sc,.85],[cx-100*sc,cy+65*sc,48*sc,112*sc,-1.35],[cx+100*sc,cy+65*sc,48*sc,112*sc,1.35],[cx,cy+80*sc,68*sc,105*sc,0]];specs.forEach(s=>addOutline(...s,80));for(let i=0;i<120;i++)stars.push({x:rand(0,W),y:rand(0,H*.75),r:rand(.5,1.8),a:rand(.2,1),p:rand(0,6)});makePetals();}
function makePetals(){document.querySelectorAll('.petala').forEach(e=>e.remove());for(let i=0;i<20;i++){let e=document.createElement('div');e.className='petala';e.textContent='❧';e.style.left=rand(5,95)+'vw';e.style.animationDuration=rand(9,18)+'s';e.style.animationDelay=rand(0,10)+'s';e.style.fontSize=rand(13,22)+'px';document.body.appendChild(e);}}
function drawOutline(t){if(t<12)return;ctx.save();ctx.globalAlpha=Math.min(1,(t-12)/3)*(.45+.25*Math.sin(t*2));ctx.strokeStyle='#eaf5ff';ctx.lineWidth=2;ctx.shadowBlur=22;ctx.shadowColor='#dfeeff';ctx.beginPath();outline.forEach((p,i)=>{if(i%80===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y)});ctx.stroke();ctx.restore();}
function animate(now){let t=((now-start)/1000)*speed;ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.globalAlpha=s.a*(.45+.55*Math.sin(now/700+s.p));ctx.fillStyle='#fff';ctx.shadowBlur=10;ctx.shadowColor='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});particles.forEach(p=>{p.update(t);p.draw(t)});drawOutline(t);ctx.globalAlpha=1;requestAnimationFrame(animate)}
addEventListener('resize',create);create();requestAnimationFrame(animate);
</script>
</body>
</html>
